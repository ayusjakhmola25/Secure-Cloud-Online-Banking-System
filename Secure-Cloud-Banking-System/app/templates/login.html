{% extends "layouts/auth_base.html" %}

{% block title %}Login - Secure Bank{% endblock %}

{% block content %}
<form class="auth-form" method="POST" action="{{ url_for('auth.login') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="field">
    <label class="field-label">Email</label>
    <input class="input" type="email" name="email" placeholder="you@example.com" required>
  </div>
  <div class="field">
    <label class="field-label">Password</label>
    <input class="input" type="password" name="password" placeholder="••••••••" required>
  </div>
  <button class="btn-submit" type="submit">Sign In</button>
</form>
{% endblock %}

{% block auth_footer %}
<p class="m-0">Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
<hr style="margin: 15px 0; border: 0; border-top: 1px solid #ddd;">
<p class="text-center m-0" style="margin-top: 15px;">
  <a href="{{ url_for('admin.login') }}" style="display: block; background: #6b21a8; color: white; padding: 10px; text-decoration: none; border-radius: 6px; font-weight: 500;">Admin Login</a>
</p>
{% endblock %}
